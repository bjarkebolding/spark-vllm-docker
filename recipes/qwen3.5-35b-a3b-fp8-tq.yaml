# Recipe: Qwen/Qwen3.5-35B-A3B-FP8 with TurboQuant KV Cache
# Qwen3.5-35B-A3B model in native FP8 format with turboquant35 KV cache


recipe_version: "1"
name: Qwen35-35B-A3B-TQ
description: vLLM serving Qwen3.5-35B-A3B-FP8 with TurboQuant KV cache

# HuggingFace model to download (optional, for --download-model)
model: Qwen/Qwen3.5-35B-A3B-FP8
turboquant_calibration_model: Qwen/Qwen3.5-35B-A3B

# Container image to use
container: vllm-node

mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 262144
  max_num_batched_tokens: 16384

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3.5-35B-A3B-FP8 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --kv-cache-dtype turboquant35 \
    --enable-turboquant \
    --load-format fastsafetensors \
    --attention-backend triton_attn \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray
